name: Deploy Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          echo "${{ secrets.LINODE_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Deploy to Linode
        run: |
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.LINODE_USER }}@${{ secrets.LINODE_HOST }} 'bash -s' << 'ENDSSH'
          set -euo pipefail

          cd /opt/minecraft

          echo "Pulling latest server repo..."
          git pull

          echo "Downloading mod JARs from Modrinth..."
          mkdir -p mods

          python3 - << 'PYEOF'
import json
import urllib.request
import os

with open('mods-list.json') as f:
    mods = json.load(f)

downloaded = set()
for mod in mods:
    version_id = mod['version_id']
    mod_name = mod['name']
    print(f"Downloading: {mod_name} ({version_id})")

    with urllib.request.urlopen(f"https://api.modrinth.com/v2/version/{version_id}") as resp:
        data = json.load(resp)

    primary = next(f for f in data['files'] if f.get('primary', False))
    url = primary['url']
    filename = primary['filename']
    dest = f"mods/{filename}"

    with urllib.request.urlopen(url) as resp:
        jar_data = resp.read()

    with open(dest, 'wb') as f:
        f.write(jar_data)

    downloaded.add(filename)
    print(f"  -> {dest}")

print(f"Downloaded {len(mods)} mods")
PYEOF

          echo "Restarting Forge server..."
          sudo systemctl restart minecraft-server

          echo "Deploy complete."
          ENDSSH

      - name: Cleanup SSH key
        if: always()
        run: rm -f /tmp/deploy_key
